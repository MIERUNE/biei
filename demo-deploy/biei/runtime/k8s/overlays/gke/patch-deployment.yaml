apiVersion: apps/v1
kind: Deployment
metadata:
  name: biei
spec:
  # No `replicas` here: the HPA owns the replica count and the kustomization
  # removes `/spec/replicas` from the base, so setting it would be dead config.
  template:
    spec:
      # GKE Autopilot hard-caps Spot-pod termination at 25s and silently ignores
      # a larger request, so declare the real ceiling instead of inheriting the
      # portable base's 35s. The in-app shutdown is bounded and detach-safe (see
      # biei-spec.md shutdown sequence: a render still running at the deadline is
      # detached, never aborted, after drain state is published), so reaching
      # this ceiling is safe, not lossy.
      terminationGracePeriodSeconds: 25
      nodeSelector:
        cloud.google.com/gke-spot: "true"
      tolerations:
        - key: cloud.google.com/gke-spot
          operator: Equal
          value: "true"
          effect: NoSchedule
      containers:
        - name: biei
          imagePullPolicy: Always
          # Trim the portable base's 10s endpoint-propagation sleep so the whole
          # sequence fits the 25s cap: 3s propagation + the app's shared 21s
          # deadline + 1s process/kubelet reserve. The app closes render admission
          # the instant it begins draining, so a short sleep does not admit new work.
          # NOTE: 3s is a demo best-effort; a real deployment should confirm
          # endpoint propagation with a controlled termination test.
          lifecycle:
            preStop:
              exec:
                command: ["/bin/sh", "-c", "sleep 3"]
          env:
            - name: BIEI_STYLE_TEMPLATES
              value: "http://ishikari:8080/styles/{style_id}/style.json"
            - name: BIEI_TILESET_URL_TEMPLATE
              value: "http://ishikari:8080/tilesets/{tileset_id}"
            - name: BIEI_MLN_RESOURCE_PRIVATE_HOSTS
              value: "ishikari"
            # Absorb the raster-preview tile fan-out while the CPU HPA creates
            # new pods. Soft routing remains one task per slot; only the hard
            # overflow boundary grows from two to three tasks per slot.
            - name: BIEI_QUEUE_CAPACITY_MULTIPLIER
              value: "3"
          resources:
            requests:
              cpu: "2"
              memory: "2Gi"
            limits:
              cpu: "4"
              memory: "4Gi"
