apiVersion: gateway.networking.k8s.io/v1
kind: HTTPRoute
metadata:
  name: biei
spec:
  parentRefs:
    - name: demo-gw
  hostnames:
    - biei-demo.mierune.dev
  rules:
    - matches:
        # Public render namespaces only. `/_internal/*` intentionally has no
        # Gateway route.
        - path: { type: PathPrefix, value: /carto }
        - path: { type: PathPrefix, value: /mierune }
        - path: { type: PathPrefix, value: /ishikari }
      backendRefs:
        - name: biei
          port: 8080
