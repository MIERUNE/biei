apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: map-demo

resources:
  - healthcheck.yaml
  - httproute.yaml
  - podmonitoring.yaml
  - hpa.yaml
  - ../../base

images:
  - name: biei
    newName: asia-northeast1-docker.pkg.dev/mappf-experiment/biei/biei
    digest: sha256:0a7b2cc46e030a821375ab3f0b8ad9cbb556e70fbe4a7e402d1812c84f61b329

patches:
  - path: patch-deployment.yaml
  # The HPA owns replica count; drop the base Deployment's fixed replicas so
  # `kubectl apply` doesn't reset the autoscaler's decision on every deploy.
  - target:
      kind: Deployment
      name: biei
    patch: |-
      - op: remove
        path: /spec/replicas
