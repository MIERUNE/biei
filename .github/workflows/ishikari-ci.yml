name: Ishikari CI

on:
  push:
    branches:
      - main
    paths:
      - "services/ishikari/**"
      - "crates/**"
      - ".github/workflows/ishikari-ci.yml"
  pull_request:
    paths:
      - "services/ishikari/**"
      - "crates/**"
      - ".github/workflows/ishikari-ci.yml"

permissions:
  contents: read

concurrency:
  group: ci-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

defaults:
  run:
    working-directory: services/ishikari

jobs:
  rust:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy,rustfmt
      # Reuse the Cargo registry and target graph across otherwise ephemeral
      # GitHub-hosted runners. Pin the v2 action to an immutable commit.
      - uses: Swatinem/rust-cache@e18b497796c12c097a38f9edb9d0641fb99eee32 # v2
        with:
          workspaces: services/ishikari -> target
      - name: Format
        run: cargo fmt --all -- --check
      - name: Clippy
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: Test
        run: cargo test --workspace --all-targets
      - name: Test Ishikari without simulator support
        run: cargo test -p ishikari --all-targets --no-default-features
