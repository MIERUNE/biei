apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

# Combined GKE demo stack. Service-owned overlays remain independently
# deployable; this root only composes their current pinned revisions with the
# shared namespace and Gateway.
resources:
  - services/ishikari/demo-deploy/k8s/platform
  - services/ishikari/demo-deploy/k8s/overlays/gke
  - services/biei/demo-deploy/k8s/overlays/gke
